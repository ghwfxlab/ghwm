---
paths:
  # Glob pattern relative to the repository root for matching files. The path separator is always '/'.
  # This example configures any YAML file under the '.github/workflows/' directory.
  .github/workflows/**/*.lock.yml:
    # Generated lock files are compiled artifacts and are not maintained by hand.
    ignore:
      - '.+'
  .github/workflows/agentics-maintenance.yml:
    ignore:
      - '.+'
  .github/workflows/**/*.{yml,yaml}:
    # List of regular expressions to filter errors by the error messages.
    ignore:
      # Ignore the specific error from shellcheck
      - 'shellcheck reported issue in this script: SC2129:.+'
      # Ignore expression errors in auto-generated gh-aw lock files referencing
      # jobs that actionlint cannot statically resolve (e.g. pre_activation).
      - 'property "pre_activation" is not defined in object type'
      # Ignore shellcheck SC1003 (single-quote escaping) in generated scripts
      - 'shellcheck reported issue in this script: SC1003:.+'
      # Ignore shellcheck SC2086 (unquoted variables) in auto-generated gh-aw lock files
      - 'shellcheck reported issue in this script: SC2086:.+'

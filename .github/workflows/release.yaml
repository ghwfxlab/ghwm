---
name: Tag Release Candidate

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/release.yaml"

permissions: {}

concurrency:
  group: tag-release-candidate
  cancel-in-progress: false

jobs:
  release:
    name: Tag and Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.bump-version.outputs.new_tag }}
    environment:
      name: production
      deployment: false
    steps:
      - name: Generate GH App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.GH_APP_ID }} # zizmor: ignore[secrets-outside-env]
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env]
          permission-contents: write

      - name: Checkout The Source Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: true

      # Version Bumping Strategy:
      # Manual Bumping: Include #major, #minor, #patch, or #none in commit message
      #   - #major: Bumps major version (e.g., v1.2.3 -> v2.0.0)
      #   - #minor: Bumps minor version (e.g., v1.2.3 -> v1.3.0)
      #   - #patch: Bumps patch version (e.g., v1.2.3 -> v1.2.4)
      #   - #none: Skips version bump entirely for that commit
      #   - If multiple tags present, highest-ranking one takes precedence
      # Automatic Bumping: If no tag is present, defaults to minor bump
      #   - To change default, set DEFAULT_BUMP env var (major, minor, patch, none)
      - name: Bump version and push tag
        id: bump-version
        uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8 # 1.75.0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG_PREFIX: v
          PRERELEASE: false

      - name: automatic-release # zizmor: ignore[superfluous-actions]
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ steps.bump-version.outputs.new_tag }}
          generate_release_notes: true
          prerelease: false

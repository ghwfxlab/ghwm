---
name: Run Tests

on: # yamllint disable-line rule:truthy
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".coveragerc"
      - ".github/workflows/tests.yaml"
      - "Makefile"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".coveragerc"
      - ".github/workflows/tests.yaml"
      - "Makefile"
  workflow_dispatch:

permissions: {}

jobs:
  test:
    name: Tests
    runs-on: ubuntu-slim
    timeout-minutes: 10
    env:
      PYTHON_COVERAGE_LIMIT: 90
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout The Source Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run tests
        run: make test 2>&1 | tee pytest-coverage.txt
        env:
          PYTEST_ADDOPTS: "--cov-report=xml --junitxml=junit.xml -o junit_family=legacy"

      - name: Read coverage
        id: coverage
        run: |
          COVERAGE=$(awk '/^TOTAL/ {print $(NF)}' pytest-coverage.txt | tr -d '%')
          echo "value=$COVERAGE" >> "$GITHUB_OUTPUT"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
          files: ./junit.xml
          report_type: test_results

      - name: Fail if coverage too low
        if: ${{ fromJSON(steps.coverage.outputs.value) < fromJSON(env.PYTHON_COVERAGE_LIMIT) }}
        run: |
          echo "Coverage is below ${{ env.PYTHON_COVERAGE_LIMIT }}%!"
          exit 1

name: Add Reviewers and Assignees

on: # yamllint disable-line rule:truthy
  pull_request:
    types:
      - opened
      - ready_for_review

permissions: {}

jobs:
  add-reviews:
    name: Add PR Reviewers and Assignees
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: kentaro-m/auto-assign-action@0a2c53d3721e4c5cfcce6afd4014aecc337979f6 # v2.0.2
        with:
          configuration-path: .github/auto_assign.yaml

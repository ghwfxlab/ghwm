---
name: Feature Request
description: Suggest a new feature or improvement for the ghwm CLI
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature.
        Please describe the problem you are trying to solve and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: A clear description of the problem or limitation you are facing.
      placeholder: "I'm always frustrated when ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you would like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you have considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project does this relate to?
      options:
        - CLI commands
        - Manifest format
        - Workflow installation
        - Lockfile behavior
        - Authentication
        - Documentation
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, mockups, or references.

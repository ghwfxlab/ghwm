---
name: Bug Report
description: Report a bug in the ghwm CLI
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.
        Please fill out the sections below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Create or update `ghwm.yml`
        2. Run a `ghwm` command
        3. See the unexpected behavior
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages or logs if available.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: CLI version
      description: The ghwm CLI version you are running.
      placeholder: "e.g. v0.1.0"

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Linux
        - macOS
        - Windows
        - CI runner
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or logs.

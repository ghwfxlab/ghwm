---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "flag:dependencies"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
    groups:
      pip-dependencies:
        patterns:
          - "*"
    labels:
      - "flag:dependencies"
